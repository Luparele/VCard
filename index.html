<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Theme Color and Mobile UI -->
    <meta name="theme-color" content="#05010a">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Cpath fill='%233ddc84' d='M37,32c0,1.1-0.9,2-2,2h-3v7c0,1.7-1.3,3-3,3s-3-1.3-3-3v-7h-4v7c0,1.7-1.3,3-3,3s-3-1.3-3-3v-7h-3c-1.1,0-2-0.9-2-2V16h26V32z M15,10.6l-1.9-3.3c-0.2-0.4-0.1-0.9,0.3-1.1c0.4-0.2,0.9-0.1,1.1,0.3l1.9,3.3C18.6,8.7,21.2,8,24,8s5.4,0.7,7.6,1.8l1.9-3.3c0.2-0.4,0.7-0.5,1.1-0.3c0.4,0.2,0.5,0.7,0.3,1.1l-1.9,3.3C36.6,12.8,39,17.1,39,22H9C9,17.1,11.4,12.8,15,10.6z M18,17c-0.6,0-1,0.4-1,1s0.4,1,1,1s1-0.4,1-1S18.6,17,18,17z M30,17c-0.6,0-1,0.4-1,1s0.4,1,1,1s1-0.4,1-1S30.6,17,30,17z'/%3E%3C/svg%3E">
    <title>Eduardo Luparele | Digital VCard</title>
    <meta name="description" content="Cartão de visitas digital de Eduardo Luparele - Cyberpunk Style.">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="cyber-container">
        <!-- Scanline & Noise Effect overlays -->
        <div class="scanlines"></div>
        <div class="noise"></div>
        
        <header class="profile-header">
            <button id="btn-share" class="share-icon-btn" title="Compartilhar">
                <i class="fas fa-share-nodes"></i>
            </button>
            <div class="profile-pic-container">
                <img src="perfil.jpeg" alt="Eduardo Luparele" id="profile-img">
                <div class="glitch-overlay"></div>
            </div>
            <h1 class="glitchText" data-text="EDUARDO LUPARELE">EDUARDO LUPARELE</h1>
            <p class="subtitle">DEVELOPER & TECH ENTHUSIAST</p>
        </header>

        <main class="links-section">
            <a href="https://wa.me/5521976658035" target="_blank" class="cyber-btn" id="btn-whatsapp">
                <span class="btn-content">
                    <i class="fab fa-whatsapp"></i> WhatsApp
                </span>
                <span class="btn-glitch"></span>
            </a>
            
            <a href="https://www.instagram.com/eduardo_luparele?igsh=cDFncDMzZDU4OGN3" target="_blank" class="cyber-btn" id="btn-instagram">
                <span class="btn-content">
                    <i class="fab fa-instagram"></i> Instagram
                </span>
                <span class="btn-glitch"></span>
            </a>

            <a href="https://www.linkedin.com/in/eduardo-luparele-coelho-492851296?utm_source=share_via&utm_content=profile&utm_medium=member_android" target="_blank" class="cyber-btn" id="btn-linkedin">
                <span class="btn-content">
                    <i class="fab fa-linkedin"></i> LinkedIn
                </span>
                <span class="btn-glitch"></span>
            </a>

            <a href="https://github.com/Luparele" target="_blank" class="cyber-btn" id="btn-github">
                <span class="btn-content">
                    <i class="fab fa-github"></i> GitHub
                </span>
                <span class="btn-glitch"></span>
            </a>

            <a href="mailto:eduardo.luparele@gmail.com" class="cyber-btn" id="btn-email">
                <span class="btn-content">
                    <i class="fas fa-envelope"></i> E-mail
                </span>
                <span class="btn-glitch"></span>
            </a>

            <button class="cyber-btn primary" id="btn-save-contact">
                <span class="btn-content">
                    <i class="fas fa-user-plus"></i> SALVAR CONTATO
                </span>
                <span class="btn-glitch"></span>
            </button>
        </main>

        <footer class="footer">
            <p>&copy; 2024 EDUARDO LUPARELE // SYSTEM_ACCESS_GRANTED</p>
        </footer>
    </div>

    <!-- Share Modal -->
    <div id="share-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-modal" id="btn-close-modal">
                <i class="fas fa-times"></i>
            </button>
            <h2 class="modal-title">QR CODE</h2>
            <div id="modal-qrcode-container"></div>
            <p class="modal-info">ESCANEAR PARA ACESSAR</p>
            
            <button class="cyber-btn primary" id="btn-modal-share">
                <span class="btn-content">
                    <i class="fas fa-paper-plane"></i> ENVIAR LINK
                </span>
                <span class="btn-glitch"></span>
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
